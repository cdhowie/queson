[package]
name = "apjson"
version = "0.1.0"
edition = "2024"

[profile.release]
strip = "symbols"
lto = "fat"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "apjson"
crate-type = ["cdylib"]

[dependencies]
pyo3 = "0.27.0"
zmij = "1.0.21"
